# 中央法规一般规定（基础层）
# 每个省级行政区可在 data/provinces/<code>-<pinyin>.yaml 中针对单类假期写覆盖/特别规定字段。

leaveTypes:
  annual:
    rule: 累计工作满 1 年以上的职工，依法享受带薪年休假，单位应保证职工享受年休假；年休假天数按累计工作年限确定。
    eligibility: 机关、团体、企业、事业单位、民办非企业单位、有雇工的个体工商户等单位的职工，连续工作满 12 个月以上。
    daysTable:
      - condition: 累计工作满 1 年不满 10 年
        days: 5
        paid: full
      - condition: 累计工作满 10 年不满 20 年
        days: 10
        paid: full
      - condition: 累计工作满 20 年以上
        days: 15
        paid: full
    notes: 单位确因工作需要不能安排年休假的，经职工本人同意，可以不安排；对应休未休的天数，按日工资收入的 300%（含正常工资 100%）支付报酬。
    citations:
      - title: 职工带薪年休假条例（国务院令第 514 号）
        url: https://www.gov.cn/gongbao/content/2008/content_859865.htm
        source: flk
        article: 第二条至第五条
      - title: 企业职工带薪年休假实施办法（人社部令第 1 号）
        url: https://www.gov.cn/gongbao/content/2009/content_1265995.htm
        source: mohrss
    lastVerified: "2026-04-26"

  marriage:
    rule: 职工本人结婚的，可享受婚假；中央层面统一为 3 天，地方法规普遍另有奖励性延长。
    daysTable:
      - condition: 依法办理结婚登记
        days: 3
        paid: full
    notes: 1980 年原劳动总局、国家计委《关于国营企业职工请婚丧假和路程假问题的通知》〔劳总薪字〔1980〕2 号〕规定 3 天婚假；现行《劳动法》第五十一条要求婚假期间用人单位依法支付工资。具体延长天数以本省条例为准。
    citations:
      - title: 中华人民共和国劳动法 第五十一条
        url: http://www.npc.gov.cn/c2/c30834/201905/t20190521_296651.html
        source: flk
        article: 第五十一条
      - title: 关于国营企业职工请婚丧假和路程假问题的通知（劳总薪字〔1980〕2 号）
        url: https://www.mohrss.gov.cn/xxgk2020/fdzdgknr/zcfg/gfxwj/zh/202103/t20210330_412011.html
        source: mohrss
    lastVerified: "2026-04-26"

  maternity:
    rule: 女职工生育享受产假，难产、多胞胎、流产等情形依法增加。
    eligibility: 与用人单位建立劳动关系的女职工。
    daysTable:
      - condition: 正常生育
        days: 98
        paid: full
      - condition: 难产
        days: "98 + 15"
        paid: full
      - condition: 多胞胎（每多生育 1 个婴儿）
        days: "+15"
        paid: full
      - condition: 怀孕未满 4 个月流产
        days: 15
        paid: full
      - condition: 怀孕 4 个月以上流产
        days: 42
        paid: full
    notes: 产假期间生育津贴由生育保险基金按上年度本单位职工月平均工资标准支付；未参加生育保险的，由用人单位按产假前工资标准支付。地方条例普遍在中央 98 天基础上额外延长（多为 60–90 天奖励假）。
    citations:
      - title: 女职工劳动保护特别规定（国务院令第 619 号）
        url: https://www.gov.cn/gongbao/content/2012/content_2136749.htm
        source: flk
        article: 第七条、第八条
      - title: 中华人民共和国人口与计划生育法
        url: https://flk.npc.gov.cn/detail2.html?ZmY4MDgxODE3YmE5NjVjNDAxN2JiODkyMWQxMzA3N2E=
        source: flk
        article: 第二十五条
    lastVerified: "2026-04-26"

  paternity:
    rule: 男方陪产假/护理假在中央层面无统一规定，由各省（自治区、直辖市）人口与计划生育条例或职工生育保险办法规定。
    notes: 修订后的《人口与计划生育法》要求各地保障合法生育的夫妻享受相关待遇；多数省份规定 10–30 天陪产/护理假，工资照发或由生育保险支付。具体天数与待遇请见所在省份条例。
    citations:
      - title: 中华人民共和国人口与计划生育法
        url: https://flk.npc.gov.cn/detail2.html?ZmY4MDgxODE3YmE5NjVjNDAxN2JiODkyMWQxMzA3N2E=
        source: flk
        article: 第二十五条
    lastVerified: "2026-04-26"

  parental:
    rule: 国家支持有条件的地方设立父母育儿假；具体子女年龄、天数、是否带薪等由各省条例规定。
    notes: 2021 年修订的《人口与计划生育法》新增条款，授权地方探索育儿假制度。多数已落地的省份规定夫妻双方在子女满 3 周岁前每年各享 5–15 天育儿假。
    citations:
      - title: 中华人民共和国人口与计划生育法
        url: https://flk.npc.gov.cn/detail2.html?ZmY4MDgxODE3YmE5NjVjNDAxN2JiODkyMWQxMzA3N2E=
        source: flk
        article: 第二十五条
    lastVerified: "2026-04-26"

  familyVisit:
    rule: 探亲假适用于国家机关、人民团体和全民所有制企业、事业单位工作满 1 年的职工；与配偶或父母不住在一起又不能利用公休假团聚的，可享受探亲假及路费。
    daysTable:
      - condition: 探望配偶（每年）
        days: 30
        paid: full
      - condition: 未婚职工探望父母（每年）
        days: 20
        paid: full
      - condition: 未婚职工探望父母（每 4 年合并）
        days: 45
        paid: full
      - condition: 已婚职工探望父母（每 4 年）
        days: 20
        paid: full
    notes: 民营/外资单位通常未纳入，实际执行差异较大；具体待遇由用人单位规章或合同约定。
    citations:
      - title: 国务院关于职工探亲待遇的规定（国发〔1981〕36 号）
        url: http://rst.gxzf.gov.cn/zwgk/xxgkzcfg/gjflfg/t3244637.shtml
        source: flk
      - title: 关于贯彻执行《国务院关于职工探亲待遇的规定》的若干具体问题的意见
        url: https://www.mohrss.gov.cn/xxgk2020/fdzdgknr/zcfg/gfxwj/zh/202103/t20210330_412011.html
        source: mohrss
    lastVerified: "2026-04-26"

  sick:
    rule: 职工患病或非因工负伤需要停止工作医疗时，根据本人实际参加工作年限和在本单位工作年限享受 3 至 24 个月的医疗期；医疗期内用人单位不得解除劳动合同。
    eligibility: 与用人单位建立劳动关系且因病或非因工负伤需要治疗、休养的职工。
    daysTable:
      - condition: 实际工作年限 10 年以下，本单位工作 5 年以下
        days: "3 个月"
        paid: partial
      - condition: 实际工作年限 10 年以下，本单位工作 5 年以上
        days: "6 个月"
        paid: partial
      - condition: 实际工作年限 10 年以上，本单位工作 5 年以下
        days: "6 个月"
        paid: partial
      - condition: 实际工作年限 10 年以上，本单位工作 5 年以上
        days: "9–24 个月"
        paid: partial
    notes: 病假工资不得低于当地最低工资标准的 80%（《关于贯彻执行〈劳动法〉若干问题的意见》第 59 条）。患特殊疾病（如癌症、精神病、瘫痪等）经批准可适当延长医疗期。
    citations:
      - title: 企业职工患病或非因工负伤医疗期规定（劳部发〔1994〕479 号）
        url: https://www.gov.cn/zhengce/2022-08/31/content_5711269.htm
        source: mohrss
      - title: 关于贯彻执行《中华人民共和国劳动法》若干问题的意见（劳部发〔1995〕309 号）
        url: https://www.mohrss.gov.cn/xxgk2020/fdzdgknr/zcfg/gfxwj/zh/202103/t20210330_412011.html
        source: mohrss
        article: 第 59 条
    lastVerified: "2026-04-26"
