code: "44"
name: 广东省
# 来源：广东省人口与计划生育条例（2021 修正版）。
leaveTypes:
  marriage:
    rule: 广东省婚假为 3 天，与中央一致。
    daysTable:
      - condition: 依法办理结婚登记
        days: 3
        paid: full
    citations:
      - title: 广东省人口与计划生育条例
        url: http://www.gd.gov.cn/zwgk/wjk/zcfgk/content/post_2532570.html
        source: local-pc
    lastVerified: "2026-04-26"

  maternity:
    rule: 在国家规定 98 天产假基础上延长 80 天产假。
    daysTable:
      - condition: 正常生育（98 天 + 80 天延长产假）
        days: 178
        paid: full
      - condition: 难产
        days: "+30"
        paid: full
      - condition: 多胞胎（每多生育 1 个婴儿）
        days: "+15"
        paid: full
    notes: 广东省难产增加 30 天（高于中央 15 天），另有流产等情形另行规定。建议通过引证链接核对最新条款。
    citations:
      - title: 广东省人口与计划生育条例 第三十条
        url: http://www.gd.gov.cn/zwgk/wjk/zcfgk/content/post_2532570.html
        source: local-pc
        article: 第三十条
    lastVerified: "2026-04-26"

  paternity:
    rule: 男方享受 15 天陪产假。
    daysTable:
      - condition: 配偶生育（合法生育子女）
        days: 15
        paid: full
    citations:
      - title: 广东省人口与计划生育条例
        url: http://www.gd.gov.cn/zwgk/wjk/zcfgk/content/post_2532570.html
        source: local-pc
    lastVerified: "2026-04-26"

  parental:
    rule: 子女三周岁以下的，夫妻双方每年各享受 10 天育儿假。
    daysTable:
      - condition: 子女不满 3 周岁（夫妻双方各自）
        days: 10
        paid: full
    citations:
      - title: 广东省人口与计划生育条例
        url: http://www.gd.gov.cn/zwgk/wjk/zcfgk/content/post_2532570.html
        source: local-pc
    lastVerified: "2026-04-26"
