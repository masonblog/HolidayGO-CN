code: "36"
name: 江西省
# 来源：江西省人口与计划生育条例（2021 修正版）。江西婚假与产假较长。
leaveTypes:
  marriage:
    rule: 江西省在国家规定 3 天婚假基础上延长 15 天，合计 18 天。
    daysTable:
      - condition: 依法办理结婚登记
        days: 18
        paid: full
    notes: 建议通过引证链接核对最新条款。
    citations:
      - title: 江西省人口与计划生育条例
        url: https://hc.nc.gov.cn/ncwjw/xxgkzcwj/202111/0bc3f1542c5c490eb2760b6df3ff6087.shtml
        source: local-gov
    lastVerified: "2026-04-26"

  maternity:
    rule: 在国家规定 98 天产假基础上延长 90 天。
    daysTable:
      - condition: 正常生育（98 天 + 90 天延长产假）
        days: 188
        paid: full
      - condition: 难产
        days: "+15"
        paid: full
      - condition: 多胞胎（每多生育 1 个婴儿）
        days: "+15"
        paid: full
    citations:
      - title: 江西省人口与计划生育条例
        url: https://hc.nc.gov.cn/ncwjw/xxgkzcwj/202111/0bc3f1542c5c490eb2760b6df3ff6087.shtml
        source: local-gov
    lastVerified: "2026-04-26"

  paternity:
    rule: 男方享受 30 天护理假。
    daysTable:
      - condition: 配偶生育（合法生育子女）
        days: 30
        paid: full
    citations:
      - title: 江西省人口与计划生育条例
        url: https://hc.nc.gov.cn/ncwjw/xxgkzcwj/202111/0bc3f1542c5c490eb2760b6df3ff6087.shtml
        source: local-gov
    lastVerified: "2026-04-26"

  parental:
    rule: 子女三周岁以下的，夫妻双方每年各享受 10 天育儿假。
    daysTable:
      - condition: 子女不满 3 周岁（夫妻双方各自）
        days: 10
        paid: full
    citations:
      - title: 江西省人口与计划生育条例
        url: https://hc.nc.gov.cn/ncwjw/xxgkzcwj/202111/0bc3f1542c5c490eb2760b6df3ff6087.shtml
        source: local-gov
    lastVerified: "2026-04-26"
