code: "32"
name: 江苏省
# 来源：江苏省人口与计划生育条例（2022 修正版）。
leaveTypes:
  marriage:
    rule: 江苏省在国家规定的 3 天婚假基础上延长 10 天，合计 13 天。
    daysTable:
      - condition: 依法办理结婚登记
        days: 13
        paid: full
    notes: 含国家规定 3 天 + 省级延长 10 天。建议通过引证链接核对最新条款。
    citations:
      - title: 江苏省人口与计划生育条例
        url: https://wjw.jiangsu.gov.cn/art/2023/3/2/art_80252_10780547.html
        source: local-pc
    lastVerified: "2026-04-26"

  maternity:
    rule: 依法生育子女的夫妻，女方在国家规定产假基础上延长产假 30 天。
    daysTable:
      - condition: 正常生育（98 天 + 30 天延长产假）
        days: 128
        paid: full
      - condition: 难产
        days: "+15"
        paid: full
      - condition: 多胞胎（每多生育 1 个婴儿）
        days: "+15"
        paid: full
    notes: 部分地市另有补充规定，建议通过引证链接核对所在地市最新执行口径。
    citations:
      - title: 江苏省人口与计划生育条例
        url: https://wjw.jiangsu.gov.cn/art/2023/3/2/art_80252_10780547.html
        source: local-pc
    lastVerified: "2026-04-26"

  paternity:
    rule: 男方享受护理假 15 天。
    daysTable:
      - condition: 配偶生育（合法生育子女）
        days: 15
        paid: full
    citations:
      - title: 江苏省人口与计划生育条例
        url: https://wjw.jiangsu.gov.cn/art/2023/3/2/art_80252_10780547.html
        source: local-pc
    lastVerified: "2026-04-26"

  parental:
    rule: 子女三周岁以下的，夫妻双方每年各享受 10 天育儿假。
    daysTable:
      - condition: 子女不满 3 周岁（夫妻双方各自）
        days: 10
        paid: full
    citations:
      - title: 江苏省人口与计划生育条例
        url: https://wjw.jiangsu.gov.cn/art/2023/3/2/art_80252_10780547.html
        source: local-pc
    lastVerified: "2026-04-26"
