code: "34"
name: 安徽省
# 来源：安徽省人口与计划生育条例（2021 修正版）。安徽护理假较长。
leaveTypes:
  marriage:
    rule: 安徽省在国家规定 3 天婚假基础上延长 10 天，合计 13 天。
    daysTable:
      - condition: 依法办理结婚登记
        days: 13
        paid: full
    citations:
      - title: 安徽省人口与计划生育条例
        url: http://www.ahrd.gov.cn/article.jsp?strId=e90f4a1a6086456ba5aecc9ce9fac03e&strColId=19118826acbf4b9a9eb668d667734965&strWebSiteId=1448865560847002
        source: local-gov
    lastVerified: "2026-04-26"

  maternity:
    rule: 在国家规定 98 天产假基础上延长 60 天。
    daysTable:
      - condition: 正常生育（98 天 + 60 天延长产假）
        days: 158
        paid: full
      - condition: 难产
        days: "+15"
        paid: full
      - condition: 多胞胎（每多生育 1 个婴儿）
        days: "+15"
        paid: full
    notes: 建议通过引证链接核对最新条款。
    citations:
      - title: 安徽省人口与计划生育条例
        url: http://www.ahrd.gov.cn/article.jsp?strId=e90f4a1a6086456ba5aecc9ce9fac03e&strColId=19118826acbf4b9a9eb668d667734965&strWebSiteId=1448865560847002
        source: local-gov
    lastVerified: "2026-04-26"

  paternity:
    rule: 男方享受 30 天护理假。
    daysTable:
      - condition: 配偶生育（合法生育子女）
        days: 30
        paid: full
    citations:
      - title: 安徽省人口与计划生育条例
        url: http://www.ahrd.gov.cn/article.jsp?strId=e90f4a1a6086456ba5aecc9ce9fac03e&strColId=19118826acbf4b9a9eb668d667734965&strWebSiteId=1448865560847002
        source: local-gov
    lastVerified: "2026-04-26"

  parental:
    rule: 子女三周岁以下的，夫妻双方每年各享受 10 天育儿假。
    daysTable:
      - condition: 子女不满 3 周岁（夫妻双方各自）
        days: 10
        paid: full
    citations:
      - title: 安徽省人口与计划生育条例
        url: http://www.ahrd.gov.cn/article.jsp?strId=e90f4a1a6086456ba5aecc9ce9fac03e&strColId=19118826acbf4b9a9eb668d667734965&strWebSiteId=1448865560847002
        source: local-gov
    lastVerified: "2026-04-26"
